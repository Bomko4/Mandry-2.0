<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Mandry SUP</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{-webkit-tap-highlight-color:transparent}.noscroll::-webkit-scrollbar{display:none}.noscroll{-ms-overflow-style:none;scrollbar-width:none}</style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-900">
<div id="app" class="max-w-md mx-auto min-h-screen bg-gray-100 flex flex-col relative">

  <!-- ============ TAB: BOOK ============ -->
  <div id="tab-book" class="tab-panel flex flex-col flex-1">
    <div class="sticky top-0 bg-gray-100/95 backdrop-blur px-4 pt-3 pb-2 z-10">
      <div class="flex items-center justify-between mb-2">
        <button onclick="prevStep()" id="backBtn" class="text-blue-600 text-sm font-medium">‹ Назад</button>
        <div class="text-center">
          <div class="text-[15px] font-semibold">MandryBooking2.0</div>
          <div class="text-[11px] text-gray-400">mini app</div>
        </div>
        <div class="w-10"></div>
      </div>
      <div class="text-[11px] text-gray-400 mb-1" id="stepLabel">Крок 1 з 4</div>
      <div class="h-1.5 bg-gray-200 rounded-full overflow-hidden">
        <div id="progressBar" class="h-full bg-blue-600 rounded-full transition-all" style="width:25%"></div>
      </div>
    </div>

    <div class="flex-1 px-4 pb-24 overflow-y-auto">
      <section id="step1" class="step">
        <h2 class="text-xl font-bold mt-2 mb-3">Оберіть дату</h2>
        <div id="dateScroll" class="flex gap-2 overflow-x-auto noscroll pb-2 mb-6"></div>
        <h2 class="text-xl font-bold mb-3">Тривалість</h2>
        <div class="flex flex-col gap-2" id="durationList">
          <button data-val="1" class="dur-btn text-left px-4 py-3 rounded-2xl bg-white border-2 border-transparent shadow-sm font-medium">1 година</button>
          <button data-val="2" class="dur-btn text-left px-4 py-3 rounded-2xl bg-white border-2 border-transparent shadow-sm font-medium">2 години</button>
          <button data-val="morning" class="dur-btn text-left px-4 py-3 rounded-2xl bg-white border-2 border-transparent shadow-sm font-medium">Сплав на світанку</button>
        </div>
      </section>

      <section id="step2" class="step hidden">
        <h2 class="text-xl font-bold mt-2 mb-3">Сапи</h2>
        <div class="flex justify-center gap-3 overflow-x-auto noscroll pb-2 mb-6" id="supScroll"></div>
        <h2 class="text-xl font-bold mb-3">Каяки</h2>
        <div class="flex justify-center gap-3 overflow-x-auto noscroll pb-2 mb-6" id="kayakScroll"></div>
      </section>

      <section id="step3" class="step hidden">
        <h2 class="text-xl font-bold mt-2 mb-3">Оберіть час</h2>
        <div id="timeGrid" class="grid grid-cols-2 gap-2"></div>
      </section>

      <section id="step4" class="step hidden">
        <h2 class="text-xl font-bold mt-2 mb-4">Ваші дані</h2>
        <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
          <label class="text-xs text-gray-400">Ім'я та прізвище</label>
          <input id="fullName" type="text" placeholder="Іван Петренко" class="w-full mt-1 text-base outline-none placeholder-gray-300">
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
          <label class="text-xs text-gray-400">Номер телефону</label>
          <input id="phoneNumber" type="tel" placeholder="+380XXXXXXXXX" class="w-full mt-1 text-base outline-none placeholder-gray-300">
        </div>
        <div id="summaryBox" class="bg-white rounded-2xl p-4 shadow-sm text-sm space-y-1 text-gray-600"></div>
      </section>
    </div>

    <div class="absolute bottom-16 left-0 right-0 p-4">
      <button id="mainBtn" onclick="nextStep()" disabled
        class="w-full bg-blue-600 disabled:bg-gray-300 text-white font-semibold py-3.5 rounded-2xl transition">Далі</button>
    </div>
  </div>

  <!-- ============ TAB: MY BOOKINGS ============ -->
  <div id="tab-bookings" class="tab-panel hidden flex-1 overflow-y-auto">
    <div class="sticky top-0 bg-gray-100/95 backdrop-blur px-4 pt-3 pb-2 z-10 text-center">
      <div class="text-[15px] font-semibold">MandryBooking2.0</div>
      <div class="text-[11px] text-gray-400">mini app</div>
    </div>
    <div class="px-4 pb-20">
      <div class="pt-4 pb-3">
        <div class="text-xl font-bold">Мої бронювання</div>
      </div>
      <div id="bookingsList" class="flex flex-col gap-3"></div>
    </div>
  </div>

  <!-- ============ TAB: ABOUT ============ -->
  <div id="tab-about" class="tab-panel hidden flex-1 overflow-y-auto">
    <div class="sticky top-0 bg-gray-100/95 backdrop-blur px-4 pt-3 pb-2 z-10 text-center">
      <div class="text-[15px] font-semibold">MandryBooking2.0</div>
      <div class="text-[11px] text-gray-400">mini app</div>
    </div>
    <div class="px-4 pb-20">
      <div class="pt-4 pb-3">
        <div class="text-xl font-bold">Інформація</div>
      </div>

      <a href="https://mandry-sup-menu.example.com" target="_blank"
         class="block w-full bg-blue-600 text-white text-center font-semibold py-3.5 rounded-2xl mb-4">🍽️ Меню</a>

      <div class="flex flex-col gap-2" id="accordions"></div>
    </div>
  </div>

  <!-- ============ BOTTOM NAV ============ -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 flex">
    <button class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5" data-tab="book">
      <span class="text-xl">🛶</span><span class="text-[11px] font-medium">Забронювати</span>
    </button>
    <button class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5" data-tab="bookings">
      <span class="text-xl">📋</span><span class="text-[11px] font-medium">Мої бронювання</span>
    </button>
    <button class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5" data-tab="about">
      <span class="text-xl">ℹ️</span><span class="text-[11px] font-medium">Інформація</span>
    </button>
  </div>

</div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();

// Use the same origin as the hosted Mini App so the backend can be proxied in Nginx.
const API_BASE_URL = `${window.location.origin}/api`;

const TIME_SLOTS = ["10:15-11:15","11:30-12:30","12:45-13:45","14:00-15:00","15:15-16:15","16:30-17:30","17:45-18:45","19:00-20:00","20:10-21:10"];
const MORNING_WINDOW = "05:45-08:00";
const MONTHS = ["січ","лют","бер","кві","тра","чер","лип","сер","вер","жов","лис","гру"];
const DAYS = ["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];

/* ================= TAB SWITCHING ================= */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.onclick = () => switchTab(btn.dataset.tab);
});
function switchTab(name){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b=>{
    const active = b.dataset.tab === name;
    b.classList.toggle('text-blue-600', active);
    b.classList.toggle('text-gray-400', !active);
  });
}
switchTab('book');

/* ================= BOOKING WIZARD ================= */
let state = { date:null, duration:null, equipment:null, quantity:1, time:null, fullName:'', phone:'' };
let step = 1;

const dateScroll = document.getElementById('dateScroll');
for (let i=0;i<28;i++){
  const d = new Date(); d.setDate(d.getDate()+i);
  const isWeekend = d.getDay() === 0 || d.getDay() === 6;
  const isToday = i === 0;
  const btn = document.createElement('button');
  btn.className = 'date-btn flex-shrink-0 w-16 py-2.5 rounded-2xl bg-white border-2 shadow-sm text-center '
    + (isToday ? 'border-blue-600' : 'border-transparent');
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  btn.dataset.val = `${dd}.${mm}`;
  const dayColor = isWeekend ? 'text-blue-600 font-bold' : 'text-gray-400';
  const numColor = isWeekend ? 'text-blue-600' : '';
  btn.innerHTML = `<div class="text-[11px] ${dayColor}">${DAYS[d.getDay()]}</div><div class="text-lg font-bold leading-tight ${numColor}">${d.getDate()}</div><div class="text-[11px] text-gray-400">${MONTHS[d.getMonth()]}</div>${isToday ? '<div class="text-[9px] text-blue-600 font-semibold mt-0.5">сьогодні</div>' : ''}`;
  btn.onclick = () => { selectOne('.date-btn', btn); state.date = btn.dataset.val; state.time = null; checkStep1(); };
  dateScroll.appendChild(btn);
}
document.querySelectorAll('.dur-btn').forEach(btn=>{
  btn.onclick = () => { selectOne('.dur-btn', btn); state.duration = btn.dataset.val; state.time = null; checkStep1(); };
});
function checkStep1(){ setMainEnabled(!!state.date && !!state.duration); }

const SUPS = [
  {id:'sup_single', title:'Сап одномісний', price1h:'400грн/год', price2h:'700грн/2 год', img:'🚣'},
  {id:'sup_double', title:'Сап двомісний', price1h:'600грн/год', price2h:'1100грн/2 год', img:'🚣‍♂️'}
];
const KAYAKS = [
  {id:'kayak_single', title:'Каяк одномісний', price1h:'450грн/год', price2h:'800грн/2 год', img:'🛶'},
  {id:'kayak_double', title:'Каяк двомісний', price1h:'700грн/год', price2h:'1300грн/2 год', img:'🛶'}
];
const supScroll = document.getElementById('supScroll');
SUPS.forEach(item=>{
  const card = document.createElement('div');
  card.className = 'eq-card flex-shrink-0 w-40 bg-white rounded-2xl shadow-sm overflow-hidden border-2 border-transparent';
  card.innerHTML = `
    <div class="h-24 bg-gray-100 flex items-center justify-center text-4xl">${item.img}</div>
    <div class="p-3">
      <div class="font-semibold text-sm mb-1">${item.title}</div>
      <div class="text-xs text-gray-400 mb-2 price-line" data-price1h="${item.price1h}" data-price2h="${item.price2h}">${item.price1h}</div>
      <div class="flex items-center justify-between bg-gray-50 rounded-xl px-1 py-1">
        <button class="qty-minus w-7 h-7 rounded-lg bg-white shadow-sm font-bold text-blue-600">−</button>
        <span class="qty-val text-sm font-semibold">1</span>
        <button class="qty-plus w-7 h-7 rounded-lg bg-white shadow-sm font-bold text-blue-600">+</button>
      </div>
    </div>`;
  const qtyVal = card.querySelector('.qty-val');
  let qty = 1;
  const selectSup = () => { selectOne('.eq-card', card); state.equipment = item.id; state.quantity = qty; state.time = null; checkStep2(); };
  card.querySelector('.qty-minus').onclick = e => { e.stopPropagation(); qty = Math.max(1, qty-1); qtyVal.textContent = qty; selectSup(); };
  card.querySelector('.qty-plus').onclick = e => { e.stopPropagation(); qty = Math.min(10, qty+1); qtyVal.textContent = qty; selectSup(); };
  card.onclick = selectSup;
  supScroll.appendChild(card);
});
const kayakScroll = document.getElementById('kayakScroll');
KAYAKS.forEach(item=>{
  const card = document.createElement('div');
  card.className = 'eq-card flex-shrink-0 w-40 bg-white rounded-2xl shadow-sm overflow-hidden border-2 border-transparent cursor-pointer';
  card.innerHTML = `
    <div class="h-24 bg-gray-100 flex items-center justify-center text-4xl">${item.img}</div>
    <div class="p-3">
      <div class="font-semibold text-sm mb-1">${item.title}</div>
      <div class="text-xs text-gray-400 mb-1 price-line" data-price1h="${item.price1h}" data-price2h="${item.price2h}">${item.price1h}</div>
    </div>`;
  card.onclick = () => { selectOne('.eq-card', card); state.equipment = item.id; state.quantity = 1; state.time = null; checkStep2(); };
  kayakScroll.appendChild(card);
});
function checkStep2(){ setMainEnabled(!!state.equipment); }
function updateEquipmentPrices(){
  const use2h = state.duration === '2';
  document.querySelectorAll('.price-line').forEach(el => {
    el.textContent = use2h ? el.dataset.price2h : el.dataset.price1h;
  });
}

const timeGrid = document.getElementById('timeGrid');

function addMinutesToTime(hhmm, minutesToAdd){
  const [h, m] = hhmm.split(':').map(Number);
  const total = h * 60 + m + minutesToAdd;
  const nh = Math.floor((total % (24*60)) / 60);
  const nm = total % 60;
  return String(nh).padStart(2,'0') + ':' + String(nm).padStart(2,'0');
}

async function fetchAvailability(date, equipment, duration){
  if (!API_BASE_URL){
    console.warn('API_BASE_URL is not set — availability cannot be checked, all slots will show as unavailable.');
    return duration === 'morning' ? { closed: true, available: false, maxQty: 0 } : { closed: true, slots: [] };
  }
  try {
    const res = await fetch(`${API_BASE_URL}/availability?date=${encodeURIComponent(date)}&equipment=${encodeURIComponent(equipment)}&duration=${encodeURIComponent(duration)}`);
    if (!res.ok) throw new Error('bad response');
    return await res.json();
  } catch (e) {
    console.error('fetchAvailability failed:', e);
    return duration === 'morning' ? { closed: true, available: false, maxQty: 0 } : { closed: true, slots: [] };
  }
}

async function renderTimeSlots(){
  timeGrid.innerHTML = '<div class="col-span-2 text-center text-sm text-gray-400 py-4">Завантаження…</div>';
  const availability = await fetchAvailability(state.date, state.equipment, state.duration);
  timeGrid.innerHTML = '';

  if (state.duration === 'morning'){
    const closed = availability.closed || !availability.available || (availability.maxQty || 0) < state.quantity;
    const btn = document.createElement('button');
    btn.className = 'time-btn col-span-2 py-3 rounded-2xl border-2 border-transparent shadow-sm font-medium '
      + (closed ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'bg-white');
    btn.textContent = MORNING_WINDOW;
    btn.disabled = closed;
    if (!closed){
      btn.onclick = () => { selectOne('.time-btn', btn); state.time = MORNING_WINDOW; setMainEnabled(true); };
    }
    timeGrid.appendChild(btn);
    if (!closed) return;
    if (availability.maxQty > 0 && availability.maxQty < state.quantity){
      const note = document.createElement('div');
      note.className = 'col-span-2 text-center text-xs text-red-500 mt-2';
      note.textContent = `Доступно лише ${availability.maxQty} од. на цей час — зменшіть кількість на попередньому кроці.`;
      timeGrid.appendChild(note);
    }
    return;
  }

  if (availability.closed){
    timeGrid.innerHTML = '<div class="col-span-2 text-center text-sm text-gray-400 py-4">На цю дату немає вільних місць</div>';
    return;
  }

  const dur = parseInt(state.duration || '1', 10);
  let anyQuantityBlocked = false;

  (availability.slots || []).forEach(slotInfo => {
    const start = slotInfo.start;
    const end = addMinutesToTime(start, dur * 60);
    const label = `${start}–${end}`;
    const enoughQty = (slotInfo.maxQty || 0) >= state.quantity;
    const isSelectable = slotInfo.available && enoughQty;
    if (slotInfo.available && !enoughQty) anyQuantityBlocked = true;

    const btn = document.createElement('button');
    btn.className = 'time-btn py-3 rounded-2xl border-2 border-transparent shadow-sm font-medium text-sm '
      + (isSelectable ? 'bg-white' : 'bg-gray-100 text-gray-300 cursor-not-allowed');
    btn.textContent = label;
    btn.disabled = !isSelectable;
    if (isSelectable){
      btn.onclick = () => { selectOne('.time-btn', btn); state.time = TIME_SLOTS.find(s => s.startsWith(start)); setMainEnabled(true); };
    }
    timeGrid.appendChild(btn);
  });

  if (anyQuantityBlocked){
    const note = document.createElement('div');
    note.className = 'col-span-2 text-center text-xs text-red-500 mt-2';
    note.textContent = `Деякі часові слоти сірі, бо на них немає ${state.quantity} вільних одиниць обладнання — зменшіть кількість на попередньому кроці.`;
    timeGrid.appendChild(note);
  }
}

const fullNameInput = document.getElementById('fullName');
fullNameInput.addEventListener('input', () => { state.fullName = fullNameInput.value.trim(); setMainEnabled(state.fullName.length > 2); });

const phoneInput = document.getElementById('phoneNumber');
phoneInput.addEventListener('input', () => { state.phone = phoneInput.value.trim(); setMainEnabled(state.fullName.length > 2 && state.phone.length > 7); });

// Tap anywhere outside an input/textarea to dismiss the keyboard
document.addEventListener('click', (e) => {
  const active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA') && e.target !== active){
    active.blur();
  }
});
function renderSummary(){
  const eqLabel = {sup_single:'Сап одномісний',sup_double:'Сап двомісний',kayak_single:'Каяк одномісний',kayak_double:'Каяк двомісний'}[state.equipment] || '';
  const durLabel = state.duration === 'morning' ? 'Сплав на світанку' : (state.duration + ' год');
  document.getElementById('summaryBox').innerHTML = `
    <div class="flex justify-between"><span>Дата</span><span class="font-medium text-gray-900">${state.date}</span></div>
    <div class="flex justify-between"><span>Тривалість</span><span class="font-medium text-gray-900">${durLabel}</span></div>
    <div class="flex justify-between"><span>Спорядження</span><span class="font-medium text-gray-900">${eqLabel} × ${state.quantity}</span></div>
    <div class="flex justify-between"><span>Час</span><span class="font-medium text-gray-900">${state.time}</span></div>`;
}

function selectOne(selector, active){
  document.querySelectorAll(selector).forEach(el => el.classList.remove('border-blue-600'));
  active.classList.add('border-blue-600');
}
function setMainEnabled(ok){ document.getElementById('mainBtn').disabled = !ok; }
function showStep(n){
  document.querySelectorAll('.step').forEach(s => s.classList.add('hidden'));
  document.getElementById('step'+n).classList.remove('hidden');
  document.getElementById('stepLabel').textContent = `Крок ${n} з 4`;
  document.getElementById('progressBar').style.width = (n*25)+'%';
  document.getElementById('backBtn').style.visibility = n === 1 ? 'hidden' : 'visible';
  const mainBtn = document.getElementById('mainBtn');
  if (n === 1) setMainEnabled(!!state.date && !!state.duration);
  if (n === 2) { updateEquipmentPrices(); setMainEnabled(!!state.equipment); }
  if (n === 3) { setMainEnabled(false); renderTimeSlots().then(() => setMainEnabled(!!state.time)); }
  if (n === 4) { renderSummary(); setMainEnabled(state.fullName.length > 2 && state.phone.length > 7); mainBtn.textContent = 'Забронювати'; }
  else mainBtn.textContent = 'Далі';
}
function nextStep(){ if (step === 4){ submitBooking(); return; } step++; showStep(step); }
function prevStep(){ if (step === 1) return; step--; showStep(step); }

function submitBooking(){
  if (!state.phone || state.phone.length < 7){
    alert('Введіть номер телефону перед бронюванням.');
    return;
  }
  const payload = {
    type:'booking',
    date: state.date,
    duration: state.duration,
    equipment: state.equipment,
    quantity: state.quantity,
    time: state.time,
    full_name: state.fullName,
    phone: state.phone,
  };
  tg?.sendData(JSON.stringify(payload));
  tg?.close();
}
showStep(1);

/* ================= MY BOOKINGS (dynamic) ================= */
const bookingsList = document.getElementById('bookingsList');

async function fetchMyBookings(){
  const userId = tg?.initDataUnsafe?.user?.id;
  if (!userId || !API_BASE_URL) return [];
  try {
    const res = await fetch(`${API_BASE_URL}/mybookings?user_id=${userId}`);
    if (!res.ok) throw new Error('bad response');
    return await res.json();
  } catch (e) {
    console.error('fetchMyBookings failed:', e);
    return [];
  }
}

async function renderBookings(){
  bookingsList.innerHTML = `<div class="text-center text-gray-400 text-sm mt-10">Завантаження…</div>`;
  const bookings = await fetchMyBookings();

  if (bookings.length === 0){
    bookingsList.innerHTML = `<div class="text-center text-gray-400 text-sm mt-10">У вас ще немає бронювань</div>`;
    return;
  }

  bookingsList.innerHTML = '';
  bookings.forEach(b => {
    const card = document.createElement('div');
    card.className = 'bg-white rounded-2xl p-4 shadow-sm';
    card.innerHTML = `
      <div class="flex justify-between items-start mb-2">
        <div class="text-sm text-gray-400">Код бронювання</div>
        <div class="text-sm font-bold tracking-wide">#${b.code}</div>
      </div>
      <div class="flex justify-between text-sm mb-1"><span class="text-gray-400">Дата</span><span class="font-medium">${b.date}</span></div>
      <div class="flex justify-between text-sm mb-1"><span class="text-gray-400">Час</span><span class="font-medium">${b.time}</span></div>
      <div class="flex justify-between text-sm mb-3"><span class="text-gray-400">Спорядження</span><span class="font-medium text-right">${b.equipment}</span></div>
      <button class="cancel-btn w-full bg-red-50 text-red-600 font-semibold py-2.5 rounded-xl">Скасувати бронювання</button>`;
    card.querySelector('.cancel-btn').onclick = () => cancelBooking(b.code, card);
    bookingsList.appendChild(card);
  });
}
renderBookings();

function cancelBooking(code, cardEl){
  tg?.sendData(JSON.stringify({ type:'cancel', cancel_code: code }));
  cardEl.style.opacity = '0.4';
  cardEl.querySelector('.cancel-btn').textContent = 'Скасовується…';
  cardEl.querySelector('.cancel-btn').disabled = true;
}

/* ================= ABOUT US ================= */
const ACCORDIONS = [
  { icon:'📋', title:'Правила користування', body:
    "1. Дотримуйтесь безпеки на воді<br>2. Використовуйте рятувальний жилет<br>3. Не перевищуйте дозволену вагу<br>4. Приходьте за 15 хвилин до старту<br>5. Слідуйте інструкціям персоналу<br>6. Повідомте про травми чи поломки" },
